name: CI/CD

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: [self-hosted, ros2-humble]
    steps:
      - name: Setup colcon workspace
        run: source /opt/ros/humble/setup.bash

      - name: Check out repo
        uses: actions/checkout@v3
        with:
          path: src/filters

      - name: Check out bb_msgs
        uses: actions/checkout@v3
        with:
          repository: Bumblebeeas/bb_msgs
          path: src/bb_msgs

      - name: Check out frames
        uses: actions/checkout@v3
        with:
          repository: BumblebeeAS/frames
          path: src/frames

      - name: Install dependencies
        run: source /opt/ros/humble/setup.bash && rosdep update && rosdep install --from-paths src -i -r -y

      - name: Build
        run: source /opt/ros/humble/setup.bash && colcon build --merge-install

      - name: Test
        run: source /opt/ros/humble/setup.bash && colcon test --merge-install

      - name: Log Tests if failed
        if: failure()
        run: colcon test-result --verbose
